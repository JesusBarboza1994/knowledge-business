# TODO: Configure unit test workflow for QA PRs

name: Unit Tests (QA)

on:
  pull_request:
    branches:
      - qa

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install

      - name: Run unit tests
        run: pnpm run test:unit
